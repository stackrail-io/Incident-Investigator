archetype_id: security-incident
scenario_id: SC-ARCH-025
tier: core
description: Security breach detected.
start:
    question: Was this a security incident?
    service: api
    goal: root_cause
    time_window:
        start: "2026-06-27T09:00:00Z"
        end: "2026-06-27T09:30:00Z"
expect_after_start:
    required_evidence_min: 1
    plan_questions_min: 1
evidence_batches:
    - - id: sec-1
        timestamp: "2026-06-27T09:01:00Z"
        category: security_events
        entity: api
        summary: unauthorized access detected; credential compromise and exploit attempt
    - - id: log-1
        timestamp: "2026-06-27T09:02:00Z"
        category: application_logs
        entity: api
        summary: intrusion attempt blocked; breach indicators in audit logs
expect_after_all_evidence:
    leading_hypothesis_id: hypothesis-security-incident
    min_confidence: 10
    min_lead_margin: 3
    must_not_lead:
        - hypothesis-unknown
    min_hypotheses: 1
    graph_nodes_min: 1
expect_after_finish:
    state: completed
    report_required_fields:
        - executive_summary
        - hypotheses
        - confidence
        - postmortem
