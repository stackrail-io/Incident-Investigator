archetype_id: network-failure
scenario_id: SC-ARCH-007
tier: core
description: Routing or packet loss without DNS symptoms.
start:
    question: Why is connectivity failing?
    service: payments-api
    goal: root_cause
    time_window:
        start: "2026-06-27T09:00:00Z"
        end: "2026-06-27T09:30:00Z"
expect_after_start:
    required_evidence_min: 1
    plan_questions_min: 1
evidence_batches:
    - - id: net-1
        timestamp: "2026-06-27T09:01:00Z"
        category: network_events
        entity: payments-api
        summary: network packet loss; tcp connection refused on private link
    - - id: log-1
        timestamp: "2026-06-27T09:02:00Z"
        category: application_logs
        entity: payments-api
        summary: connection reset by peer; tcp socket unreachable
expect_after_all_evidence:
    leading_hypothesis_id: hypothesis-network-failure
    min_confidence: 10
    min_lead_margin: 3
    must_not_lead:
        - hypothesis-dns-failure
        - hypothesis-unknown
    min_hypotheses: 1
    graph_nodes_min: 1
expect_after_finish:
    state: completed
    report_required_fields:
        - executive_summary
        - hypotheses
        - confidence
        - postmortem
