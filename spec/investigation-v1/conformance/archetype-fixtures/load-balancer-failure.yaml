archetype_id: load-balancer-failure
scenario_id: SC-ARCH-020
tier: core
description: Load balancer health check failure.
start:
    question: Why is traffic not reaching backends?
    service: gateway
    goal: root_cause
    time_window:
        start: "2026-06-27T09:00:00Z"
        end: "2026-06-27T09:30:00Z"
expect_after_start:
    required_evidence_min: 1
    plan_questions_min: 1
evidence_batches:
    - - id: log-1
        timestamp: "2026-06-27T09:01:00Z"
        category: application_logs
        entity: gateway
        summary: nginx health check failed; alb backend unhealthy; envoy dead pool
    - - id: log-2
        timestamp: "2026-06-27T09:02:00Z"
        category: application_logs
        entity: gateway
        summary: 'haproxy proxy failure: all backends marked unhealthy by load balancer'
expect_after_all_evidence:
    leading_hypothesis_id: hypothesis-load-balancer-failure
    min_confidence: 10
    min_lead_margin: 3
    must_not_lead:
        - hypothesis-network-failure
        - hypothesis-unknown
    min_hypotheses: 1
    graph_nodes_min: 1
expect_after_finish:
    state: completed
    report_required_fields:
        - executive_summary
        - hypotheses
        - confidence
        - postmortem
