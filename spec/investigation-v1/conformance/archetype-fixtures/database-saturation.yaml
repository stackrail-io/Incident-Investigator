archetype_id: database-saturation
scenario_id: SC-ARCH-005
tier: core
description: Database connection pool exhausted.
start:
    question: Why are orders timing out?
    service: orders-api
    goal: root_cause
    time_window:
        start: "2026-06-27T09:00:00Z"
        end: "2026-06-27T09:30:00Z"
expect_after_start:
    required_evidence_min: 1
    plan_questions_min: 1
evidence_batches:
    - - id: log-1
        timestamp: "2026-06-27T09:03:00Z"
        category: application_logs
        entity: orders-api
        summary: database connection pool exhausted; query timeout
    - - id: metric-1
        timestamp: "2026-06-27T09:04:00Z"
        category: metrics
        entity: postgres-primary
        summary: db connections 100/100 saturated, cpu 95%
      - id: db-1
        timestamp: "2026-06-27T09:05:00Z"
        category: database_events
        entity: postgres-primary
        summary: Postgres active connections at limit; write IOPS saturated
expect_after_all_evidence:
    leading_hypothesis_id: hypothesis-database-saturation
    min_confidence: 10
    min_lead_margin: 3
    must_not_lead:
        - hypothesis-dr-failover-failure
        - hypothesis-unknown
    min_hypotheses: 1
    graph_nodes_min: 1
expect_after_finish:
    state: completed
    report_required_fields:
        - executive_summary
        - hypotheses
        - confidence
        - postmortem
