    service: ledger-api
    goal: root_cause
    time_window:
        start: "2026-06-27T09:00:00Z"
        end: "2026-06-27T09:30:00Z"
expect_after_start:
    required_evidence_min: 1
    plan_questions_min: 1
evidence_batches:
    - - id: log-1
        timestamp: "2026-06-27T09:01:00Z"
        category: application_logs
        entity: ledger-api
        summary: checksum mismatch detected; corrupted data on ledger shard
    - - id: log-2
        timestamp: "2026-06-27T09:02:00Z"
        category: application_logs
        entity: ledger-api
        summary: partial write failed data integrity validation; checksum mismatch on commit
expect_after_all_evidence:
