    min_confidence: 10
    min_lead_margin: 3
    must_not_lead:
        - hypothesis-human-error
        - hypothesis-unknown
    min_hypotheses: 1
    graph_nodes_min: 1
expect_after_finish:
    state: completed
    report_required_fields:
        - executive_summary
        - hypotheses
        - confidence
        - postmortem
