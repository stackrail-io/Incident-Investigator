# Investigation Specification v1 — Investigation Archetypes
#
# Normative library of vendor-neutral failure-mode archetypes.
# Implementations map evidence signals to archetypes and competing hypotheses.

openapi: 3.1.0
info:
  title: Investigation Spec v1 — Archetypes
  version: 1.0.0
  description: >
    Formal contract for the 30-category incident taxonomy plus supporting
    archetypes (deployment-unrelated baseline, database lock contention split).
    Each archetype declares a hypothesis id, expected evidence categories,
    signal triggers, and a portable conformance fixture.

components:
  schemas:
    ArchetypeDomain:
      type: string
      description: Library grouping for archetypes.
      enum:
        - application
        - infrastructure
        - data
        - platform
        - operations
        - security
        - external
        - generic

    InvestigationArchetype:
      type: object
      required:
        - id
        - name
        - domain
        - hypothesis_id
        - priority
        - conformance_fixture
      properties:
        id:
          type: string
          description: Stable library identifier (kebab-case).
        name:
          type: string
        domain:
          $ref: '#/components/schemas/ArchetypeDomain'
        hypothesis_id:
          type: string
          description: Hypothesis id produced when this archetype scores.
        priority:
          type: integer
          minimum: 1
          maximum: 5
        taxonomy_rank:
          type: integer
          description: Position in the 30-item production taxonomy (1-30); omitted for auxiliary archetypes.
        signal_triggers:
          type: array
          items:
            type: string
          description: Keyword signal groups from evidence analysis.
        expected_evidence:
          type: array
          items:
            $ref: './categories.yaml#/components/schemas/EvidenceCategory'
        typical_subcauses:
          type: array
          items:
            type: string
        conformance_fixture:
          type: string
          description: >
            Path (from repo root) to portable YAML conformance scenario.
            Fixture expect_after_all_evidence may declare min_lead_margin and
            must_not_lead to assert separation from competing hypotheses.
        notes:
          type: string

x-investigation-archetypes:
  - id: deployment-failure
    name: Deployment Failure
    domain: application
    hypothesis_id: hypothesis-deployment-caused
    priority: 5
