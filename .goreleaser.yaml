version: 2

project_name: incident-investigator

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: incident-investigator
    main: ./cmd/incident-investigator
    binary: incident-investigator
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/stackrail/incident-investigator/internal/version.Version={{.Version}}
      - -X github.com/stackrail/incident-investigator/internal/version.Commit={{.Commit}}
      - -X github.com/stackrail/incident-investigator/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: stackrail-io
    name: Incident-Investigator
  draft: false
  prerelease: auto
